<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; background-color: #1a1d24;">
    <div class="card-body p-5">
      
      <div class="text-center mb-4">
        <h3 class="fw-bold text-white mb-2">Recuperar Contraseña</h3>
        <p class="text-secondary small">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
      </div>

      <div *ngIf="mensajeExito" class="alert alert-success py-2 text-center small" role="alert">
        {{ mensajeExito }}
      </div>
      <div *ngIf="mensajeError" class="alert alert-danger py-2 text-center small" role="alert">
        {{ mensajeError }}
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="form-label text-white-50">Correo Electrónico</label>
          <input type="email" class="form-control bg-dark text-white border-secondary" 
                 formControlName="correo" placeholder="ejemplo@correo.com">
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-bold text-dark mb-3" [disabled]="forgotForm.invalid || cargando">
          {{ cargando ? 'Enviando...' : 'Enviar Enlace' }}
        </button>

        <div class="text-center">
          <a routerLink="/login" class="text-secondary text-decoration-none small">Volver al inicio de sesión</a>
        </div>
      </form>

    </div>
  </div>
</div>
