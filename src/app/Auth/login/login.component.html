<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; background-color: #1a1d24;">
    <div class="card-body p-5">
      
      <div class="text-center mb-4">
        <h2 class="fw-bold text-white mb-0">PBK</h2>
        <p class="text-secondary small">Sistema interno de biblioteca</p>
      </div>

      <div *ngIf="mensajeError" class="alert alert-danger py-2 text-center" role="alert">
        {{ mensajeError }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="mb-3">
          <label class="form-label text-white-50">Correo Electrónico</label>
          <input type="email" class="form-control bg-dark text-white border-secondary" 
                 formControlName="correo" placeholder="ejemplo@correo.com">
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label text-white-50 mb-0">Contraseña</label>
            <a routerLink="/forgot-password" class="text-warning small text-decoration-none" style="font-size: 0.8rem;">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
          <input type="password" class="form-control bg-dark text-white border-secondary" 
                 formControlName="password" placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-bold" [disabled]="loginForm.invalid">
          Iniciar Sesión
        </button>

      </form>
    </div>
  </div>
</div>
